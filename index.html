<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Prompterator - Out of Control</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="shell" aria-label="Prompterator">
    <header class="masthead">
      <p class="eyebrow">OUT OF CONTROL</p>
      <h1>PROMPTERATOR</h1>
    </header>

    <section class="machine" id="machine">
      <div class="machine__left">
        <nav class="mode-panel" aria-label="Mode select">
          <button class="mode-button" type="button" data-mode="mureka">
            <span>MUREKA</span>
            <small>Music Mode</small>
          </button>
          <button class="mode-button is-active" type="button" data-mode="visual">
            <span>VISUAL STYLE</span>
            <small>Image Mode</small>
          </button>
          <button class="mode-button" type="button" data-mode="crazy">
            <span>TOTALLY CRAZY</span>
            <small>Chaos Mode</small>
          </button>
        </nav>

        <section class="slots" aria-label="Prompt slots">
          <article class="slot" data-slot="0">
            <div class="slot__label" id="slotLabel0">Subject</div>
            <div class="slot__window">
              <div class="slot__value" id="slotValue0">...</div>
            </div>
            <button class="spin-button" type="button" data-spin="0">SPIN</button>
          </article>

          <article class="slot" data-slot="1">
            <div class="slot__label" id="slotLabel1">Style</div>
            <div class="slot__window">
              <div class="slot__value" id="slotValue1">...</div>
            </div>
            <button class="spin-button" type="button" data-spin="1">SPIN</button>
          </article>

          <article class="slot" data-slot="2">
            <div class="slot__label" id="slotLabel2">Effect</div>
            <div class="slot__window">
              <div class="slot__value" id="slotValue2">...</div>
            </div>
            <button class="spin-button" type="button" data-spin="2">SPIN</button>
          </article>
        </section>
      </div>

      <aside class="trigger-panel" aria-label="Main trigger">
        <button class="orb" id="unleashButton" type="button">
          <span>CLICK TO</span>
          <strong>UNLEASH</strong>
        </button>
      </aside>
    </section>

    <section class="prompt-panel" aria-label="Generated prompt">
      <textarea id="promptOutput" spellcheck="false" readonly aria-label="Prompt output"></textarea>
      <div class="prompt-actions">
        <button class="action-button copy" id="copyButton" type="button">COPY</button>
        <button class="action-button delete" id="deleteButton" type="button">DELETE</button>
      </div>
    </section>
  </main>

  <div class="toast" id="toast" role="status" aria-live="polite">COPIED</div>
  <script src="app.js"></script>
</body>
</html>
